      parameters:
        - $ref: '#/components/parameters/StatusServiceParam'
        - $ref: '#/components/parameters/ServiceTypeParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Danh sách tất cả đơn dịch vụ
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ServiceOrder'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/services/order/{id}/assign:
    patch:
      tags: [Services]
      summary: Gán provider cho đơn dịch vụ (admin only)
      description: |
        Gán một user có role **provider** để thực hiện đơn.

        Provider được gán sẽ thấy đơn này trong `GET /api/services/provider-orders`
        và có thể cập nhật trạng thái `confirmed → in_progress → done`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [providerId]
              properties:
                providerId:
                  $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Gán provider thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          order:
                            $ref: '#/components/schemas/ServiceOrder'
        '400':
          description: Đơn đã done hoặc cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Đơn không tồn tại hoặc provider không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/services/order/{id}:
    patch:
      tags: [Services]
      summary: Cập nhật trạng thái đơn dịch vụ (landlord / provider / admin)
      description: |
        Quyền chuyển trạng thái theo role:

        | Role | Được phép |
        |---|---|
        | **tenant** | `pending → cancelled` |
        | **landlord** | `pending → confirmed`, `pending/confirmed → cancelled` |
        | **provider** | `confirmed → in_progress`, `in_progress → done` (chỉ đơn được gán) |
        | **admin** | mọi transition hợp lệ |

        **Provider** chỉ update được đơn đã được gán cho mình qua `/assign`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [confirmed, in_progress, done, cancelled]
                  example: confirmed
                cancelReason:
                  type: string
                  maxLength: 500
                  nullable: true
                  example: Nhân viên bận, vui lòng đặt lại.
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          order:
                            $ref: '#/components/schemas/ServiceOrder'
        '400':
          description: Transition không hợp lệ với role hiện tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/roommates/request/{id}/cancel:
    patch:
      tags: [Roommates]
      summary: Hủy lời mời đã gửi
      description: Chỉ người **gửi** lời mời mới được hủy. Lời mời phải đang ở trạng thái `pending`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Hủy thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          request:
                            $ref: '#/components/schemas/RoommateRequest'
        '400':
          description: Lời mời không còn ở trạng thái pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
