openapi: 3.0.3

info:
  title: SmartRental API
  version: 1.0.0
  description: |
    REST API cho nền tảng cho thuê phòng trọ **SmartRental**.

    ## Xác thực
    Dùng **Bearer JWT** cho các endpoint yêu cầu đăng nhập.
    1. Gọi `POST /api/auth/login` → lấy `accessToken`
    2. Nhấn **Authorize** (🔒) → điền `Bearer <accessToken>`

servers:
  - url: http://localhost:5000
    description: Local development

tags:
  - name: Auth
    description: Đăng ký, đăng nhập, refresh token
  - name: Users
    description: Quản lý người dùng
  - name: Properties
    description: Quản lý bất động sản
  - name: Bookings
    description: Quản lý đặt phòng / thuê nhà
  - name: Upload
    description: Upload ảnh lên Cloudinary
  - name: Contracts
    description: Hợp đồng điện tử — tạo, ký, quản lý
  - name: Roommates
    description: Tìm người ở ghép — hồ sơ, gợi ý matching, lời mời ghép
  - name: Services
    description: Dịch vụ đi kèm — danh mục dịch vụ, đặt dịch vụ, quản lý đơn
  - name: Payment
    description: Thanh toán qua PayOS — tạo link, webhook callback, kiểm tra trạng thái

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    MongoId:
      type: string
      pattern: '^[a-f\d]{24}$'
      example: 664f1b2c3e4d5a6b7c8d9e0f

    Address:
      type: object
      required:
        - city
      properties:
        street:
          type: string
          example: 12 Nguyễn Văn Linh
        ward:
          type: string
          example: Phường Tân Phú
        district:
          type: string
          example: Quận 7
        city:
          type: string
          example: Hồ Chí Minh
        lat:
          type: number
          nullable: true
          example: 10.7336
        lng:
          type: number
          nullable: true
          example: 106.7026
        fullAddress:
          type: string
          nullable: true
          example: 12 Nguyễn Văn Linh, Phường Tân Phú, Quận 7, Hồ Chí Minh

    PropertyImage:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          example: https://res.cloudinary.com/smartrental/image/upload/sample.jpg
        isPrimary:
          type: boolean
          default: false
          example: true

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 5

    User:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        name:
          type: string
          example: Nguyễn Văn A
        email:
          type: string
          format: email
          example: a@example.com
        phone:
          type: string
          nullable: true
          example: '0901234567'
        avatar:
          type: string
          format: uri
          nullable: true
        bio:
          type: string
          nullable: true
          maxLength: 300
          example: Xin chào, tôi là chủ nhà tại Quận 7.
        gender:
          type: string
          enum: [male, female, other]
          nullable: true
          example: male
        dateOfBirth:
          type: string
          format: date
          nullable: true
          example: '1995-08-20'
        address:
          type: string
          nullable: true
          example: 12 Nguyễn Văn Linh, Quận 7, TP.HCM
        role:
          type: string
          enum: [tenant, landlord, admin, provider]
          example: tenant
        isActive:
          type: boolean
          example: true
        isPhoneVerified:
          type: boolean
          example: false
          description: true khi đã xác thực SĐT qua OTP → được phép đăng tin (landlord)
        bankAccount:
          type: object
          nullable: true
          description: Thông tin tài khoản ngân hàng để nhận payout (landlord / provider)
          properties:
            bankName:
              type: string
              example: Vietcombank
            accountNumber:
              type: string
              example: '0123456789'
            accountName:
              type: string
              example: NGUYEN VAN A
            branch:
              type: string
              nullable: true
              example: Chi nhánh HCM
            verifiedAt:
              type: string
              format: date-time
              nullable: true
              description: Admin xác nhận STK hợp lệ — null nếu chưa verify
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGci...
        refreshToken:
          type: string
          example: eyJhbGci...
        user:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
              example: Nguyễn Văn A
            email:
              type: string
              example: a@example.com
            role:
              type: string
              enum: [tenant, landlord, admin, provider]

    Property:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        title:
          type: string
          example: Phòng trọ cao cấp Quận 7
        description:
          type: string
          example: Phòng rộng, thoáng mát, full nội thất
        type:
          type: string
          enum: [room, apartment, house, studio]
          example: room
        status:
          type: string
          enum: [available, rented, maintenance]
          example: available
        price:
          type: number
          example: 3500000
          description: Giá thuê hàng tháng (VNĐ)
        pricePerM2:
          type: number
          nullable: true
          example: 175000
          description: Tự động tính = price / area
        area:
          type: number
          nullable: true
          example: 20
        bedrooms:
          type: integer
          nullable: true
          minimum: 0
          example: 1
        bathrooms:
          type: integer
          nullable: true
          minimum: 0
          example: 1
        address:
          $ref: '#/components/schemas/Address'
        amenities:
          type: array
          items:
            type: string
          example: [wifi, parking, ac]
        images:
          type: array
          items:
            $ref: '#/components/schemas/PropertyImage'
        owner:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
            phone:
              type: string
            avatar:
              type: string
        contact:
          type: object
          nullable: true
          properties:
            name:
              type: string
              nullable: true
              example: Anh Nam
            phone:
              type: string
              nullable: true
              example: '0909123456'
        views:
          type: integer
          example: 128
        isFeatured:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Booking:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        property:
          description: Thông tin bất động sản (populated)
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            title:
              type: string
              example: Phòng trọ cao cấp Quận 7
            address:
              $ref: '#/components/schemas/Address'
            price:
              type: number
              example: 3500000
            type:
              type: string
              enum: [room, apartment, house, studio]
            images:
              type: array
              items:
                $ref: '#/components/schemas/PropertyImage'
        tenant:
          description: Người thuê (populated)
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
              example: Trần Thị Mai
            email:
              type: string
              example: mai@example.com
            phone:
              type: string
              example: '0912345678'
            avatar:
              type: string
              nullable: true
        landlord:
          description: Chủ nhà (populated)
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
              example: Nguyễn Văn A
            email:
              type: string
              example: a@example.com
            phone:
              type: string
              example: '0901234567'
            avatar:
              type: string
              nullable: true
        startDate:
          type: string
          format: date
          example: '2026-05-01'
        endDate:
          type: string
          format: date
          example: '2026-08-01'
        duration:
          type: integer
          minimum: 1
          maximum: 24
          example: 3
          description: Số tháng thuê
        totalPrice:
          type: number
          example: 10500000
          description: Tổng tiền = price × duration
        status:
          type: string
          enum: [pending, confirmed, rejected, cancelled, active, completed]
          example: pending
          description: |
            - **pending**: Chờ chủ nhà xác nhận
            - **confirmed**: Chủ nhà đã chấp nhận, property bị lock
            - **rejected**: Chủ nhà từ chối (hoặc auto-reject khi booking khác được confirm)
            - **cancelled**: Huỷ bởi tenant / landlord / admin
            - **active**: Tenant đã dọn vào (check-in)
            - **completed**: Kết thúc hợp đồng, property trở lại available
        note:
          type: string
          nullable: true
          maxLength: 500
          example: Tôi muốn xem phòng trước khi chuyển vào.
        rejectionReason:
          type: string
          nullable: true
          maxLength: 500
          example: Chủ nhà đã chọn tenant khác.
        cancelledBy:
          type: string
          nullable: true
          enum: [tenant, landlord, admin]
          example: tenant
        cancelReason:
          type: string
          nullable: true
          maxLength: 500
          example: Tôi đã tìm được chỗ khác.
        paymentStatus:
          type: string
          enum: [unpaid, paid, refunded]
          default: unpaid
          example: unpaid
          description: |
            - **unpaid**: Chưa thanh toán tiền cọc + tháng đầu
            - **paid**: Đã thanh toán — landlord mới có thể activate
            - **refunded**: Đã hoàn tiền
        paymentCode:
          type: integer
          nullable: true
          example: 1714123456789
          description: Mã orderCode gửi lên PayOS (tự động gán khi tạo link thanh toán)
        depositAmount:
          type: number
          nullable: true
          example: 3500000
          description: Tiền cọc = property.price × 1 (gán khi tạo link thanh toán)
        paidDate:
          type: string
          format: date-time
          nullable: true
          example: '2026-05-02T10:30:00.000Z'
          description: Thời điểm webhook PayOS xác nhận thanh toán thành công
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ContractSignature:
      type: object
      properties:
        signed:
          type: boolean
          example: true
        signedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-05-01T08:30:00.000Z'

    Contract:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        booking:
          description: Thông tin booking (populated)
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
            duration:
              type: integer
            totalPrice:
              type: number
            status:
              type: string
              enum: [pending, confirmed, rejected, cancelled, active, completed]
            note:
              type: string
              nullable: true
        tenant:
          description: Người thuê (populated)
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
              example: Trần Thị Mai
            email:
              type: string
            phone:
              type: string
              nullable: true
            address:
              type: string
              nullable: true
            avatar:
              type: string
              nullable: true
        landlord:
          description: Chủ nhà (populated)
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
              example: Nguyễn Văn A
            email:
              type: string
            phone:
              type: string
              nullable: true
            address:
              type: string
              nullable: true
            avatar:
              type: string
              nullable: true
        property:
          description: Bất động sản (populated)
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            title:
              type: string
            type:
              type: string
              enum: [room, apartment, house, studio]
            address:
              $ref: '#/components/schemas/Address'
            area:
              type: number
              nullable: true
            bedrooms:
              type: integer
              nullable: true
            bathrooms:
              type: integer
              nullable: true
            price:
              type: number
        terms:
          type: string
          nullable: true
          maxLength: 2000
          description: Điều khoản bổ sung do landlord thêm vào
          example: Không nuôi thú cưng. Đóng tiền trước ngày 5 hàng tháng.
        pdfUrl:
          type: string
          format: uri
          nullable: true
          description: URL PDF trên Cloudinary (cập nhật sau mỗi lần ký)
          example: https://res.cloudinary.com/smartrental/raw/upload/contracts/contract_abc123.pdf
        status:
          type: string
          enum: [draft, awaiting_signatures, signed, cancelled]
          example: awaiting_signatures
          description: |
            - **draft**: Nháp (chưa dùng, dự phòng)
            - **awaiting_signatures**: Chờ cả 2 bên ký
            - **signed**: Đã ký đầy đủ
            - **cancelled**: Đã huỷ (admin)
        signedByTenant:
          $ref: '#/components/schemas/ContractSignature'
        signedByLandlord:
          $ref: '#/components/schemas/ContractSignature'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RoommateProfile:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        user:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
              example: Trần Thị Mai
            avatar:
              type: string
              format: uri
              nullable: true
            gender:
              type: string
              enum: [male, female, other]
              nullable: true
        property:
          description: Phòng đang thuê (nếu có)
          nullable: true
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            title:
              type: string
              example: Phòng trọ Quận 7
            address:
              $ref: '#/components/schemas/Address'
            price:
              type: number
              example: 3500000
        budget:
          type: object
          properties:
            min:
              type: integer
              example: 2000000
              description: Ngân sách tối thiểu (VNĐ/tháng)
            max:
              type: integer
              example: 5000000
              description: Ngân sách tối đa (VNĐ/tháng)
        gender:
          type: string
          enum: [male, female, any]
          example: any
          description: Giới tính người ghép muốn tìm
        schedule:
          type: string
          enum: [early_bird, night_owl, flexible]
          example: flexible
          description: |
            - **early_bird**: Ngủ sớm dậy sớm
            - **night_owl**: Thức khuya
            - **flexible**: Linh hoạt
        lifestyle:
          type: string
          enum: [quiet, social, mixed]
          example: mixed
          description: |
            - **quiet**: Yên tĩnh, ít giao tiếp
            - **social**: Thích giao lưu
            - **mixed**: Linh hoạt
        pets:
          type: boolean
          example: false
          description: Chấp nhận nuôi thú cưng
        smoking:
          type: boolean
          example: false
          description: Chấp nhận hút thuốc
        looking:
          type: boolean
          example: true
          description: Đang tìm người ghép (true = hiển thị trong matches)
        bio:
          type: string
          nullable: true
          maxLength: 500
          example: Mình là sinh viên, thích yên tĩnh, về nhà sau 6 giờ tối.
        matchScore:
          type: integer
          nullable: true
          example: 75
          description: Điểm tương thích (0–100), chỉ có khi gọi GET /matches
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RoommateRequest:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        sender:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
              example: Nguyễn Văn A
            avatar:
              type: string
              format: uri
              nullable: true
        receiver:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
              example: Trần Thị Mai
            avatar:
              type: string
              format: uri
              nullable: true
        status:
          type: string
          enum: [pending, accepted, rejected, cancelled]
          example: pending
          description: |
            - **pending**: Chờ phản hồi
            - **accepted**: Đã chấp nhận
            - **rejected**: Đã từ chối
            - **cancelled**: Người gửi đã hủy
        message:
          type: string
          nullable: true
          maxLength: 300
          example: Chào bạn, mình muốn ghép phòng cùng bạn nhé!
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ServiceCatalogItem:
      type: object
      properties:
        type:
          type: string
          enum: [cleaning, repair, wifi, moving, painting, registration]
          example: cleaning
        name:
          type: string
          example: Dọn dẹp vệ sinh
        price:
          type: number
          example: 150000
          description: Giá dịch vụ (VNĐ)
        unit:
          type: string
          example: lần

    ServiceOrder:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MongoId'
        tenant:
          description: Người thuê (populated)
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
              example: Trần Thị Mai
            email:
              type: string
              example: mai@example.com
            phone:
              type: string
              nullable: true
              example: '0912345678'
            avatar:
              type: string
              nullable: true
        property:
          description: Bất động sản (populated)
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            title:
              type: string
              example: Phòng trọ Quận 7
            address:
              $ref: '#/components/schemas/Address'
            type:
              type: string
              enum: [room, apartment, house, studio]
            images:
              type: array
              items:
                $ref: '#/components/schemas/PropertyImage'
        assignedProvider:
          description: Provider được admin gán thực hiện đơn (populated)
          nullable: true
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MongoId'
            name:
              type: string
              example: Nguyễn Thợ Điện
            email:
              type: string
              example: thodien@example.com
            phone:
              type: string
              nullable: true
              example: '0909111222'
            avatar:
              type: string
              nullable: true
        type:
          type: string
          enum: [cleaning, repair, wifi, moving, painting, registration]
          example: cleaning
          description: |
            - **cleaning**: Dọn dẹp vệ sinh (150.000 ₫/lần)
            - **repair**: Sửa chữa (200.000 ₫/lần)
            - **wifi**: Lắp đặt WiFi (500.000 ₫/lần)
            - **moving**: Chuyển đồ (300.000 ₫/lần)
            - **painting**: Sơn nhà (1.000.000 ₫/phòng)
            - **registration**: Đăng ký tạm trú/tạm vắng (100.000 ₫/hồ sơ)
        status:
          type: string
          enum: [pending, confirmed, in_progress, done, cancelled]
          example: pending
          description: |
            - **pending**: Chờ xác nhận
            - **confirmed**: Đã xác nhận lịch
            - **in_progress**: Đang thực hiện
            - **done**: Hoàn thành
            - **cancelled**: Đã huỷ
        scheduledAt:
          type: string
          format: date-time
          example: '2026-05-10T09:00:00.000Z'
          description: Thời điểm thực hiện dịch vụ (phải là tương lai khi đặt)
        price:
          type: number
          example: 150000
          description: Giá tự động lấy từ catalog theo type
        note:
          type: string
          nullable: true
          maxLength: 500
          example: Vui lòng dọn phòng bếp và phòng tắm.
        cancelReason:
          type: string
          nullable: true
          maxLength: 500
          example: Tenant đã huỷ lịch.
        paymentStatus:
          type: string
          enum: [unpaid, paid, refunded]
          default: unpaid
          example: unpaid
          description: |
            - **unpaid**: Chưa thanh toán
            - **paid**: Đã thanh toán — webhook xác nhận
            - **refunded**: Đã hoàn tiền
        paymentCode:
          type: integer
          nullable: true
          example: 1714123456789
          description: Mã orderCode gửi lên PayOS (tự động gán khi tạo link)
        platformFee:
          type: number
          nullable: true
          example: 15000
          description: Phí platform (10% price) — tính khi webhook xác nhận paid
        providerPayout:
          type: number
          nullable: true
          example: 135000
          description: Số tiền trả cho provider (90% price) — tính khi webhook xác nhận paid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaymentLink:
      type: object
      properties:
        checkoutUrl:
          type: string
          format: uri
          example: https://pay.payos.vn/web/abc123
          description: URL trang thanh toán PayOS — redirect user đến đây
        orderCode:
          type: integer
          example: 1714123456789
          description: Mã đơn hàng gửi lên PayOS (timestamp)
        amount:
          type: number
          example: 150000
          description: Số tiền thanh toán (VNĐ)

    PaymentStatus:
      type: object
      properties:
        orderCode:
          type: integer
          example: 1714123456789
        status:
          type: string
          enum: [PENDING, PAID, CANCELLED, EXPIRED]
          example: PAID
          description: Trạng thái trên hệ thống PayOS
        amount:
          type: number
          example: 150000
        transactions:
          type: array
          description: Lịch sử giao dịch từ PayOS
          items:
            type: object
            properties:
              reference:
                type: string
                example: FT24001234567
              amount:
                type: number
                example: 150000
              accountNumber:
                type: string
                example: '0772408848'
              description:
                type: string
                example: SR-CLEANING
              transactionDateTime:
                type: string
                format: date-time
        paymentStatus:
          type: string
          enum: [unpaid, paid, refunded]
          example: paid
          description: Trạng thái trong DB SmartRental

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          type: object

    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          type: array
          items: {}
        pagination:
          $ref: '#/components/schemas/Pagination'

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Error message
        errors:
          type: array
          items:
            type: string
          nullable: true

  responses:
    Unauthorized:
      description: Chưa xác thực hoặc token không hợp lệ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Không có quyền truy cập
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Không tìm thấy tài nguyên
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    BadRequest:
      description: Dữ liệu đầu vào không hợp lệ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Xung đột dữ liệu
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId (24 ký tự hex)
      schema:
        $ref: '#/components/schemas/MongoId'

    PageParam:
      name: page
      in: query
      description: Số trang (bắt đầu từ 1)
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      description: Số bản ghi mỗi trang
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 10

    StatusBookingParam:
      name: status
      in: query
      description: Lọc theo trạng thái booking
      schema:
        type: string
        enum: [pending, confirmed, rejected, cancelled, active, completed]

    StatusContractParam:
      name: status
      in: query
      description: Lọc theo trạng thái hợp đồng
      schema:
        type: string
        enum: [draft, awaiting_signatures, signed, cancelled]

    BookingIdParam:
      name: bookingId
      in: path
      required: true
      description: MongoDB ObjectId của booking
      schema:
        $ref: '#/components/schemas/MongoId'

    UserIdParam:
      name: userId
      in: path
      required: true
      description: MongoDB ObjectId của user nhận lời mời
      schema:
        $ref: '#/components/schemas/MongoId'

    StatusRoommateRequestParam:
      name: status
      in: query
      description: Lọc theo trạng thái lời mời
      schema:
        type: string
        enum: [pending, accepted, rejected, cancelled]

    StatusServiceParam:
      name: status
      in: query
      description: Lọc theo trạng thái đơn dịch vụ
      schema:
        type: string
        enum: [pending, confirmed, in_progress, done, cancelled]

    ServiceTypeParam:
      name: type
      in: query
      description: Lọc theo loại dịch vụ
      schema:
        type: string
        enum: [cleaning, repair, wifi, moving, painting, registration]

paths:

  # ─── AUTH ────────────────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Đăng ký tài khoản mới
      description: |
        Tạo tài khoản với role **tenant** (mặc định).

        Muốn trở thành landlord để đăng tin cho thuê:
        1. Đăng ký
        2. Gọi `POST /api/auth/request-landlord` → nhận OTP qua SMS
        3. Gọi `POST /api/auth/verify-phone` với OTP → role nâng lên `landlord`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Trần Thị Mai
                email:
                  type: string
                  format: email
                  example: mai.tran@gmail.com
                password:
                  type: string
                  minLength: 6
                  example: Matkhau@123
                phone:
                  type: string
                  pattern: '^(0|\+84)[0-9]{9}$'
                  example: '0912345678'
      responses:
        '201':
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: a@example.com
                password:
                  type: string
                  example: secret123
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/refresh-token:
    post:
      tags: [Auth]
      summary: Làm mới access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGci...
      responses:
        '200':
          description: Token mới
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Đăng xuất (revoke refresh token)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Đăng xuất thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Thông tin tài khoản đang đăng nhập
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Thông tin user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/request-landlord:
    post:
      tags: [Auth]
      summary: Yêu cầu nâng lên landlord — gửi OTP qua SMS
      description: OTP có hiệu lực trong **5 phút**.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OTP đã được gửi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Đã là landlord hoặc chưa có số điện thoại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Gửi quá nhanh, vui lòng chờ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/verify-phone:
    post:
      tags: [Auth]
      summary: Xác thực OTP — nâng role lên landlord
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  pattern: '^\d{6}$'
                  example: '482951'
      responses:
        '200':
          description: Xác thực thành công — đã là landlord
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokens'
        '400':
          description: OTP không hợp lệ hoặc đã hết hạn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── USERS ───────────────────────────────────────────────────────────────────

  /api/users:
    get:
      tags: [Users]
      summary: Danh sách users (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: role
          in: query
          schema:
            type: string
            enum: [tenant, landlord, admin, provider]
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Danh sách users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Thông tin user theo ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Thông tin user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Users]
      summary: Cập nhật hồ sơ cá nhân
      description: |
        Mỗi user chỉ cập nhật được chính mình; admin có thể cập nhật bất kỳ ai.

        **Không thể thay đổi:** `email`, `password` (dùng endpoint riêng).

        **Chỉ admin:** `role`, `isActive`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                  pattern: '^(0|\+84)[0-9]{9}$'
                avatar:
                  type: string
                  format: uri
                bio:
                  type: string
                  maxLength: 300
                gender:
                  type: string
                  enum: [male, female, other]
                dateOfBirth:
                  type: string
                  format: date
                address:
                  type: string
                role:
                  type: string
                  enum: [tenant, landlord, admin, provider]
                  description: Chỉ admin
                isActive:
                  type: boolean
                  description: Chỉ admin
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Users]
      summary: Xoá user — soft delete (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Xoá thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/users/{id}/password:
    put:
      tags: [Users]
      summary: Đổi mật khẩu
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  example: oldPass123
                newPassword:
                  type: string
                  minLength: 6
                  example: newPass456
      responses:
        '200':
          description: Đổi mật khẩu thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/users/{id}/bank-account:
    put:
      tags: [Users]
      summary: Cập nhật tài khoản ngân hàng (landlord / provider)
      description: |
        Landlord và Provider đăng ký tài khoản ngân hàng để nhận tiền từ platform.

        - `verifiedAt` luôn reset về `null` khi cập nhật — admin cần verify lại.
        - Chỉ chủ tài khoản hoặc admin mới được gọi endpoint này.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bankName, accountNumber, accountName]
              properties:
                bankName:
                  type: string
                  example: Vietcombank
                accountNumber:
                  type: string
                  example: '0123456789'
                accountName:
                  type: string
                  example: NGUYEN VAN A
                branch:
                  type: string
                  example: Chi nhánh HCM
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── PROPERTIES ──────────────────────────────────────────────────────────────

  /api/properties:
    get:
      tags: [Properties]
      summary: Tìm kiếm & lọc bất động sản (public)
      description: Trả về tất cả bất động sản đang hoạt động. Tin nổi bật (`isFeatured`) luôn ở đầu danh sách.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: city
          in: query
          schema:
            type: string
          example: Hồ Chí Minh
        - name: district
          in: query
          schema:
            type: string
          example: Quận 7
        - name: type
          in: query
          schema:
            type: string
            enum: [room, apartment, house, studio]
        - name: status
          in: query
          schema:
            type: string
            enum: [available, rented, maintenance]
        - name: minPrice
          in: query
          schema:
            type: number
          example: 1000000
        - name: maxPrice
          in: query
          schema:
            type: number
          example: 5000000
        - name: bedrooms
          in: query
          schema:
            type: integer
            minimum: 0
          example: 1
        - name: bathrooms
          in: query
          schema:
            type: integer
            minimum: 0
          example: 1
        - name: search
          in: query
          description: Tìm theo tiêu đề
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc]
            default: newest
      responses:
        '200':
          description: Danh sách bất động sản
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Property'

    post:
      tags: [Properties]
      summary: Tạo bất động sản mới (landlord / admin)
      description: Bài đăng hiển thị ngay lập tức sau khi tạo.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, type, price, address]
              properties:
                title:
                  type: string
                  minLength: 3
                  maxLength: 200
                  example: Phòng trọ Quận 7 full nội thất
                description:
                  type: string
                  example: Phòng sạch, thoáng mát, gần trung tâm
                type:
                  type: string
                  enum: [room, apartment, house, studio]
                price:
                  type: number
                  example: 3500000
                area:
                  type: number
                  example: 20
                bedrooms:
                  type: integer
                  minimum: 0
                  example: 1
                bathrooms:
                  type: integer
                  minimum: 0
                  example: 1
                address:
                  $ref: '#/components/schemas/Address'
                amenities:
                  type: array
                  items:
                    type: string
                  example: [wifi, ac, parking]
                images:
                  type: array
                  items:
                    $ref: '#/components/schemas/PropertyImage'
                contact:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Anh Nam
                    phone:
                      type: string
                      example: '0909123456'
      responses:
        '201':
          description: Tạo thành công — hiển thị ngay
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          property:
                            $ref: '#/components/schemas/Property'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/properties/my/listings:
    get:
      tags: [Properties]
      summary: Bất động sản của tôi (landlord / admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [available, rented, maintenance]
      responses:
        '200':
          description: Danh sách bất động sản của tôi
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Property'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/properties/{id}:
    get:
      tags: [Properties]
      summary: Chi tiết bất động sản (public)
      description: Tăng `views` mỗi lần gọi.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Chi tiết bất động sản
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          property:
                            $ref: '#/components/schemas/Property'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Properties]
      summary: Cập nhật bất động sản (landlord / admin)
      description: |
        Admin có thêm quyền toggle `isFeatured`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 3
                  maxLength: 200
                description:
                  type: string
                type:
                  type: string
                  enum: [room, apartment, house, studio]
                status:
                  type: string
                  enum: [available, rented, maintenance]
                price:
                  type: number
                area:
                  type: number
                bedrooms:
                  type: integer
                  minimum: 0
                bathrooms:
                  type: integer
                  minimum: 0
                address:
                  $ref: '#/components/schemas/Address'
                amenities:
                  type: array
                  items:
                    type: string
                images:
                  type: array
                  items:
                    $ref: '#/components/schemas/PropertyImage'
                contact:
                  type: object
                  properties:
                    name:
                      type: string
                    phone:
                      type: string
                isFeatured:
                  type: boolean
                  description: Chỉ admin
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          property:
                            $ref: '#/components/schemas/Property'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Properties]
      summary: Xoá bất động sản — soft delete (landlord / admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Xoá thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── BOOKINGS ────────────────────────────────────────────────────────────────

  /api/bookings:
    get:
      tags: [Bookings]
      summary: Tất cả bookings (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/StatusBookingParam'
      responses:
        '200':
          description: Danh sách tất cả bookings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Bookings]
      summary: Tạo yêu cầu đặt phòng (tenant only)
      description: |
        Nhiều tenant có thể gửi request cùng lúc cho cùng 1 property.

        Hệ thống tự block nếu property đã có booking `confirmed` hoặc `active`.

        `totalPrice` và `endDate` được tính tự động:
        - `totalPrice = property.price × duration`
        - `endDate = startDate + duration tháng`
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property, startDate, duration]
              properties:
                property:
                  $ref: '#/components/schemas/MongoId'
                startDate:
                  type: string
                  format: date
                  example: '2026-05-01'
                  description: Phải từ hôm nay trở đi
                duration:
                  type: integer
                  minimum: 1
                  maximum: 24
                  example: 3
                  description: Số tháng thuê
                note:
                  type: string
                  maxLength: 500
                  example: Tôi muốn xem phòng trước khi chuyển vào.
      responses:
        '201':
          description: Gửi yêu cầu thành công — chờ landlord xác nhận
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          booking:
                            $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/bookings/my:
    get:
      tags: [Bookings]
      summary: Bookings của tôi với tư cách tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/StatusBookingParam'
      responses:
        '200':
          description: Danh sách bookings của tenant
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/bookings/landlord:
    get:
      tags: [Bookings]
      summary: Bookings trên property của tôi (landlord)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/StatusBookingParam'
      responses:
        '200':
          description: Danh sách bookings cho landlord
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/bookings/{id}:
    get:
      tags: [Bookings]
      summary: Chi tiết booking
      description: Chỉ tenant, landlord liên quan hoặc admin mới xem được.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Chi tiết booking
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          booking:
                            $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/bookings/{id}/confirm:
    put:
      tags: [Bookings]
      summary: Xác nhận booking (landlord)
      description: |
        Chuyển booking từ `pending` → `confirmed`.

        **Tự động (trong một transaction):**
        - Các booking `pending` khác trên cùng property → `rejected`
        - Property `status` → `rented`

        **Idempotency:** Dùng atomic update với pre-condition `status: pending`.
        Nếu 2 request confirm cùng lúc, chỉ 1 thành công — request còn lại nhận `400`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Xác nhận thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          booking:
                            $ref: '#/components/schemas/Booking'
        '400':
          description: Booking không ở trạng thái pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/bookings/{id}/reject:
    put:
      tags: [Bookings]
      summary: Từ chối booking (landlord)
      description: Chuyển booking từ `pending` → `rejected`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  maxLength: 500
                  example: Tôi đã chọn tenant khác phù hợp hơn.
      responses:
        '200':
          description: Từ chối thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          booking:
                            $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/bookings/{id}/cancel:
    put:
      tags: [Bookings]
      summary: Huỷ booking (tenant / landlord / admin)
      description: |
        - **Tenant / Landlord**: huỷ khi `pending` hoặc `confirmed`
        - **Admin**: huỷ thêm khi `active`

        Nếu huỷ từ trạng thái `confirmed` hoặc `active` → property revert về `available`
        (booking + property cập nhật trong cùng một transaction).

        **Idempotency:** Nếu 2 request huỷ cùng lúc, chỉ 1 thành công — request kia nhận `409`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  example: Tôi đã tìm được chỗ khác.
      responses:
        '200':
          description: Huỷ thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          booking:
                            $ref: '#/components/schemas/Booking'
        '400':
          description: Booking không ở trạng thái có thể huỷ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Trạng thái booking đã thay đổi trước khi xử lý xong (race condition)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/bookings/{id}/activate:
    put:
      tags: [Bookings]
      summary: Check-in — tenant đã dọn vào (landlord / admin)
      description: |
        Chuyển booking từ `confirmed` → `active`.

        **Điều kiện bắt buộc (kiểm tra đồng thời trong một atomic update):**
        - `status === 'confirmed'`
        - `paymentStatus === 'paid'`

        Tenant cần thanh toán qua `POST /api/payment/booking/:bookingId` trước.

        **Idempotency:** Nếu 2 request activate cùng lúc, chỉ 1 thành công — request kia nhận `409`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Kích hoạt thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          booking:
                            $ref: '#/components/schemas/Booking'
        '400':
          description: Booking chưa confirmed hoặc tenant chưa thanh toán
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Trạng thái booking đã thay đổi trước khi xử lý xong (race condition)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/bookings/{id}/complete:
    put:
      tags: [Bookings]
      summary: Kết thúc hợp đồng (landlord / admin)
      description: |
        Chuyển booking từ `active` → `completed`.

        Property revert về `available` (booking + property trong cùng một transaction).

        **Idempotency:** Nếu 2 request complete cùng lúc, chỉ 1 thành công — request kia nhận `409`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Hoàn thành thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          booking:
                            $ref: '#/components/schemas/Booking'
        '400':
          description: Booking không ở trạng thái active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Trạng thái booking đã thay đổi trước khi xử lý xong (race condition)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── UPLOAD ──────────────────────────────────────────────────────────────────

  /api/upload:
    get:
      tags: [Upload]
      summary: Danh sách ảnh trên Cloudinary (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Danh sách ảnh
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          images:
                            type: array
                            items:
                              type: object
                              properties:
                                publicId:
                                  type: string
                                  example: smartrental/properties/abc123
                                url:
                                  type: string
                                  format: uri
                                createdAt:
                                  type: string
                                  format: date-time
                                bytes:
                                  type: integer
                                  example: 204800
                          count:
                            type: integer
                            example: 5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Upload]
      summary: Upload ảnh lên Cloudinary (landlord / admin)
      description: |
        Upload tối đa **10 ảnh** cùng lúc (JPEG / PNG / WebP), mỗi ảnh ≤ 5 MB.

        Dùng URL trả về để điền vào `images[].url` khi tạo / cập nhật property.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Tối đa 10 file (JPEG / PNG / WebP)
      responses:
        '201':
          description: Upload thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          images:
                            type: array
                            items:
                              type: object
                              properties:
                                url:
                                  type: string
                                  format: uri
                                  example: https://res.cloudinary.com/smartrental/image/upload/v1/smartrental/properties/abc123.jpg
                                publicId:
                                  type: string
                                  example: smartrental/properties/abc123
                          count:
                            type: integer
                            example: 2
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      tags: [Upload]
      summary: Xoá ảnh khỏi Cloudinary (landlord / admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [publicId]
              properties:
                publicId:
                  type: string
                  example: smartrental/properties/abc123
      responses:
        '200':
          description: Xoá thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─── CONTRACTS ───────────────────────────────────────────────────────────────

  /api/contracts/generate:
    post:
      tags: [Contracts]
      summary: Tạo hợp đồng từ booking đã confirmed (landlord)
      description: |
        Chỉ landlord sở hữu booking mới được tạo hợp đồng.

        **Điều kiện:** Booking phải ở trạng thái `confirmed`.

        Hệ thống tự động:
        - Điền thông tin tenant, landlord, property, các điều khoản thuê
        - Generate PDF và upload lên Cloudinary
        - Trả về `pdfUrl` để xem / download bản nháp

        Sau khi tạo, cả 2 bên dùng `PATCH /api/contracts/:id/sign` để ký.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookingId]
              properties:
                bookingId:
                  $ref: '#/components/schemas/MongoId'
                terms:
                  type: string
                  maxLength: 2000
                  nullable: true
                  example: Không nuôi thú cưng. Đóng tiền trước ngày 5 hàng tháng.
                  description: Điều khoản bổ sung (tuỳ chọn)
      responses:
        '201':
          description: Tạo hợp đồng thành công — PDF đã được upload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          contract:
                            $ref: '#/components/schemas/Contract'
        '400':
          description: Booking chưa ở trạng thái confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Hợp đồng đã tồn tại cho booking này
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/contracts/my:
    get:
      tags: [Contracts]
      summary: Hợp đồng của tôi (tenant / landlord)
      description: |
        - **tenant**: trả về các hợp đồng mà mình là bên thuê
        - **landlord**: trả về các hợp đồng mà mình là chủ nhà
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/StatusContractParam'
      responses:
        '200':
          description: Danh sách hợp đồng
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Contract'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/contracts:
    get:
      tags: [Contracts]
      summary: Tất cả hợp đồng (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/StatusContractParam'
      responses:
        '200':
          description: Danh sách tất cả hợp đồng
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Contract'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/contracts/booking/{bookingId}:
    get:
      tags: [Contracts]
      summary: Hợp đồng theo booking ID
      description: Tenant, landlord liên quan hoặc admin mới xem được.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingIdParam'
      responses:
        '200':
          description: Chi tiết hợp đồng
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          contract:
                            $ref: '#/components/schemas/Contract'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/contracts/{id}:
    get:
      tags: [Contracts]
      summary: Chi tiết hợp đồng theo ID
      description: Tenant, landlord liên quan hoặc admin mới xem được.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Chi tiết hợp đồng
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          contract:
                            $ref: '#/components/schemas/Contract'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/contracts/{id}/sign:
    patch:
      tags: [Contracts]
      summary: Ký hợp đồng điện tử (tenant / landlord)
      description: |
        Mỗi bên chỉ ký được **một lần**.

        Hệ thống tự động nhận biết bạn là tenant hay landlord dựa vào JWT.

        **Idempotency (atomic):** Dùng `findOneAndUpdate` với filter `signedBy{Party}.signed: false`.
        - Tenant và landlord có thể ký đồng thời mà không ghi đè lên nhau (2 field khác nhau).
        - Nếu cùng một người gọi 2 lần liên tiếp → request thứ 2 nhận `400`.

        Khi **cả 2 bên đã ký**:
        - `status` chuyển thành `signed`
        - PDF được regenerate với timestamp ký của cả 2 bên và upload lại Cloudinary
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Ký thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          contract:
                            $ref: '#/components/schemas/Contract'
        '400':
          description: Đã ký rồi, hoặc hợp đồng đã huỷ / đã signed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/contracts/{id}/cancel:
    patch:
