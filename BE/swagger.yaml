    get:
      tags: [Payment]
      summary: Kiểm tra trạng thái thanh toán dịch vụ (tenant only)
      description: |
        Query trạng thái đơn trực tiếp từ PayOS.

        Dùng sau khi user hoàn tất thanh toán để xác nhận kết quả mà không cần webhook.
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          description: MongoDB ObjectId của ServiceOrder
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Trạng thái thanh toán
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentStatus'
        '400':
          description: Chưa khởi tạo thanh toán
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payment/service/{orderId}:
    post:
      tags: [Payment]
      summary: Tạo link thanh toán PayOS (tenant only)
      description: |
        Tạo link thanh toán cho đơn dịch vụ. Trả về `checkoutUrl` để redirect user sang trang PayOS.

        **Điều kiện:**
        - Đơn phải thuộc tenant đang đăng nhập
        - `paymentStatus` phải là `unpaid`
        - `status` không được là `cancelled`

        Link thanh toán hết hạn sau **15 phút**.

        **Luồng sau khi tạo link:**
        1. Frontend redirect user đến `checkoutUrl`
        2. User thanh toán trên PayOS
        3. PayOS gọi webhook `POST /api/payment/webhook` → DB cập nhật `paymentStatus: paid`
        4. User được redirect về `PAYOS_RETURN_URL`
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          description: MongoDB ObjectId của ServiceOrder
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Tạo link thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentLink'
        '400':
          description: Đơn đã thanh toán hoặc đã bị huỷ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payment/webhook:
    post:
      tags: [Payment]
      summary: PayOS Webhook callback (internal)
      description: |
        Endpoint này do **PayOS tự gọi** sau khi thanh toán hoàn tất — không gọi thủ công.

        PayOS gửi `POST` với body chứa thông tin giao dịch đã ký bằng `checksumKey`.
        Server verify chữ ký → cập nhật `paymentStatus: paid` + tính `platformFee` / `providerPayout`.

        | Field | Giá trị |
        |---|---|
        | `platformFee` | 10% của `price` |
        | `providerPayout` | 90% của `price` |

        **Idempotency:** Webhook xử lý trong MongoDB transaction với atomic `updateOne({ paymentStatus: {$ne: 'paid'} })`.
        PayOS có thể gọi lại nhiều lần (retry) — chỉ lần đầu có `modifiedCount > 0` thực sự cập nhật DB.
        Các lần sau trả `rspCode: '02'` (Already paid) mà không gây side effect.

        **Không cần Authorization header.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Payload do PayOS gửi (tự động)
              properties:
                code:
                  type: string
                  example: '00'
                  description: "'00' = thành công"
                desc:
                  type: string
                  example: success
                data:
                  type: object
                  properties:
                    orderCode:
                      type: integer
                      example: 1714123456789
                    amount:
                      type: number
                      example: 150000
                    description:
                      type: string
                      example: SR-CLEANING
                signature:
                  type: string
                  description: HMAC-SHA256 dùng checksumKey để verify
      responses:
        '200':
          description: Xử lý thành công (PayOS luôn cần nhận 200)
          content:
            application/json:
              schema:
                type: object
                properties:
                  rspCode:
                    type: string
                    example: '00'
                    description: |
                      - `'00'` = Xử lý thành công
                      - `'02'` = Đã thanh toán trước đó (idempotent retry)
                      - `'97'` = Sai chữ ký checksumKey
                      - `'01'` = Không tìm thấy đơn hàng theo orderCode
                  message:
                    type: string
                    example: Payment confirmed

  /api/roommates/profile:
    post:
      tags: [Roommates]
      summary: Tạo hoặc cập nhật hồ sơ tìm người ghép
      description: |
        Nếu đã có hồ sơ thì cập nhật (upsert). Mỗi user chỉ có **một** hồ sơ.

        Sau khi tạo hồ sơ, đặt `looking: true` để xuất hiện trong danh sách gợi ý của người khác.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [budget, gender, schedule, lifestyle, pets, smoking]
              properties:
                budget:
                  type: object
                  required: [min, max]
                  properties:
                    min:
                      type: integer
                      minimum: 0
                      example: 2000000
                    max:
                      type: integer
                      minimum: 0
                      example: 5000000
                gender:
                  type: string
                  enum: [male, female, any]
                  example: any
                schedule:
                  type: string
                  enum: [early_bird, night_owl, flexible]
                  example: flexible
                lifestyle:
                  type: string
                  enum: [quiet, social, mixed]
                  example: mixed
                pets:
                  type: boolean
                  example: false
                smoking:
                  type: boolean
                  example: false
                looking:
                  type: boolean
                  default: true
                  example: true
                property:
                  $ref: '#/components/schemas/MongoId'
                bio:
                  type: string
                  maxLength: 500
                  example: Mình là sinh viên, về nhà sau 6 giờ tối, thích yên tĩnh.
