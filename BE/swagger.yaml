  /api/payment/booking/{bookingId}:
    post:
      tags: [Payment]
      summary: Tạo link thanh toán booking (tenant only)
      description: |
        Tạo link thanh toán cho booking đã được landlord **confirmed**.

        Số tiền thanh toán = **tiền cọc (1 tháng) + tháng đầu tiên**:
        - `depositAmount = property.price × 1`
        - `firstMonth = property.price`
        - `amount = depositAmount + firstMonth`

        Sau khi thanh toán thành công → `paymentStatus: paid` → landlord mới có thể activate.
      security:
        - bearerAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Tạo link thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          checkoutUrl:
                            type: string
                            format: uri
                            example: https://pay.payos.vn/web/abc123
                          orderCode:
                            type: integer
                            example: 1714123456789
                          amount:
                            type: number
                            example: 7000000
                            description: Tổng tiền = cọc + tháng đầu
                          depositAmount:
                            type: number
                            example: 3500000
                          firstMonth:
                            type: number
                            example: 3500000
        '400':
          description: Booking chưa confirmed hoặc đã thanh toán
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

