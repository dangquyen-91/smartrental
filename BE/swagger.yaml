  # ─── SERVICES ────────────────────────────────────────────────────────────────

  /api/services:
    get:
      tags: [Services]
      summary: Danh sách dịch vụ kèm giá (public)
      description: |
        Trả về catalog 6 dịch vụ đi kèm với giá cố định.

        | Loại | Tên | Giá |
        |---|---|---|
        | `cleaning` | Dọn dẹp vệ sinh | 150.000 ₫/lần |
        | `repair` | Sửa chữa | 200.000 ₫/lần |
        | `wifi` | Lắp đặt WiFi | 500.000 ₫/lần |
        | `moving` | Chuyển đồ | 300.000 ₫/lần |
        | `painting` | Sơn nhà | 1.000.000 ₫/phòng |
        | `registration` | Đăng ký tạm trú/tạm vắng | 100.000 ₫/hồ sơ |

        ## Luồng hoạt động (Platform-managed)
        ```
        [Tenant]   POST /order              → pending
        [Landlord] PATCH status=confirmed   → confirmed
        [Admin]    PATCH /:id/assign        → gán provider
        [Provider] PATCH status=in_progress → in_progress
        [Provider] PATCH status=done        → done
        ```
        Huỷ: tenant (pending), landlord (pending/confirmed), admin (bất kỳ)
      responses:
        '200':
          description: Danh sách dịch vụ
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          services:
                            type: array
                            items:
                              $ref: '#/components/schemas/ServiceCatalogItem'

