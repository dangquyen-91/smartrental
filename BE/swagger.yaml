            schema:
              type: object
              required: [property, type, scheduledAt]
              properties:
                property:
                  $ref: '#/components/schemas/MongoId'
                type:
                  type: string
                  enum: [cleaning, repair, wifi, moving, painting, registration]
                  example: cleaning
                scheduledAt:
                  type: string
                  format: date-time
                  example: '2026-05-10T09:00:00.000Z'
                  description: Phải là thời điểm trong tương lai
                note:
                  type: string
                  maxLength: 500
                  example: Vui lòng dọn phòng bếp và phòng tắm.
      responses:
        '201':
          description: Đặt dịch vụ thành công — chờ xác nhận
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          order:
                            $ref: '#/components/schemas/ServiceOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

